<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeskPilot Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container { padding: 32px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .status { color: #4ade80; font-size: 14px; margin-bottom: 24px; }
    .info { color: #666; font-size: 12px; line-height: 1.8; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>DeskPilot Agent</h1>
    <p class="status"><span class="dot"></span>Running</p>
    <p class="info">
      Screen capture active<br>
      Waiting for mobile connection...<br>
      <br>
      Check terminal for logs
    </p>
  </div>
</body>
</html>
